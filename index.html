<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Particle Final</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #video_container { position: absolute; bottom: 10px; right: 10px; width: 180px; height: 135px; border: 2px solid #00f2ff; border-radius: 10px; overflow: hidden; transform: scaleX(-1); z-index: 10; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; pointer-events: none; z-index: 10; border-left: 4px solid #00f2ff; }
        .hint { color: #00f2ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <h3 style="margin:0">Particle Controller</h3>
    <p><span class="hint">Mengepal:</span> Saturnus</p>
    <p><span class="hint">1 Jari:</span> Menara Eiffel</p>
    <p><span class="hint">2 Jari:</span> Planet Bumi</p>
    <p><span class="hint">3 Jari:</span> Pohon Natal</p>
    <p style="font-size: 12px; color: #aaa;">Putar pergelangan tangan untuk ZOOM</p>
</div>

<div id="video_container">
    <video id="input_video"></video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<script>
// --- 1. SETUP DASAR ---
const particleCount = 150000;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

camera.position.z = 25;

// --- 2. GENERATOR BENTUK ---
const geometry = new THREE.BufferGeometry();
const posArray = new Float32Array(particleCount * 3);
const colArray = new Float32Array(particleCount * 3);

const shapes = {
    saturn: new Float32Array(particleCount * 3),
    eiffel: new Float32Array(particleCount * 3),
    earth: new Float32Array(particleCount * 3),
    earthCol: new Float32Array(particleCount * 3),
    xmas: new Float32Array(particleCount * 3),
    xmasCol: new Float32Array(particleCount * 3)
};

for (let i = 0; i < particleCount; i++) {
    const idx = i * 3;

    // Saturnus
    if (i < particleCount * 0.4) {
        const phi = Math.acos(-1 + (2 * i) / (particleCount * 0.4));
        const theta = Math.sqrt(particleCount * 0.4 * Math.PI) * phi;
        shapes.saturn[idx] = 4 * Math.cos(theta) * Math.sin(phi);
        shapes.saturn[idx+1] = 4 * Math.sin(theta) * Math.sin(phi);
        shapes.saturn[idx+2] = 4 * Math.cos(phi);
    } else {
        const r = 6 + Math.random() * 3;
        const a = Math.random() * Math.PI * 2;
        shapes.saturn[idx] = Math.cos(a) * r;
        shapes.saturn[idx+1] = (Math.random() - 0.5) * 0.3;
        shapes.saturn[idx+2] = Math.sin(a) * r;
    }

    // Eiffel (Matematika Eksponensial)
    const yE = (Math.random() * 20) - 10;
    const nYE = (yE + 10) / 20;
    const curve = 5 * Math.exp(-2.5 * nYE);
    const p = Math.floor(Math.random() * 4);
    shapes.eiffel[idx] = ((p < 2 ? 1 : -1) * curve) + (Math.random()-0.5)*0.1;
    shapes.eiffel[idx+1] = yE;
    shapes.eiffel[idx+2] = ((p % 2 === 0 ? 1 : -1) * curve) + (Math.random()-0.5)*0.1;

    // Bumi
    const phiB = Math.acos(-1 + (2 * i) / particleCount);
    const thetaB = Math.sqrt(particleCount * Math.PI) * phiB;
    const rB = 7;
    shapes.earth[idx] = rB * Math.cos(thetaB) * Math.sin(phiB);
    shapes.earth[idx+1] = rB * Math.sin(thetaB) * Math.sin(phiB);
    shapes.earth[idx+2] = rB * Math.cos(phiB);
    const n = Math.sin(shapes.earth[idx]*0.5) * Math.cos(shapes.earth[idx+1]*0.5);
    const c = new THREE.Color(n > 0.1 ? 0x228b22 : 0x0044ff);
    shapes.earthCol[idx] = c.r; shapes.earthCol[idx+1] = c.g; shapes.earthCol[idx+2] = c.b;

    // Xmas
    const yX = (Math.random() * 16) - 8;
    const nYX = (yX + 8) / 16;
    const rX = (1.1 - nYX) * 6;
    shapes.xmas[idx] = (Math.random()-0.5) * rX;
    shapes.xmas[idx+1] = yX;
    shapes.xmas[idx+2] = (Math.random()-0.5) * rX;
    const cX = Math.random() > 0.98 ? new THREE.Color(0xff0000) : new THREE.Color(0x00ff00);
    shapes.xmasCol[idx] = cX.r; shapes.xmasCol[idx+1] = cX.g; shapes.xmasCol[idx+2] = cX.b;

    // Start as Saturn
    posArray[idx] = shapes.saturn[idx];
    posArray[idx+1] = shapes.saturn[idx+1];
    posArray[idx+2] = shapes.saturn[idx+2];
    colArray[idx] = 1; colArray[idx+1] = 0.8; colArray[idx+2] = 0.2;
}

geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colArray, 3));

const material = new THREE.PointsMaterial({
    size: 0.04,
    vertexColors: true,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending
});

const points = new THREE.Points(geometry, material);
scene.add(points);

// --- 3. LOGIKA TRACKING TANGAN ---
let currentTarget = shapes.saturn;
let currentTargetCol = null;
let baseColor = new THREE.Color(0xffd700);

const videoElement = document.getElementById('input_video');
const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});

hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

hands.onResults((res) => {
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const pts = res.multiHandLandmarks[0];

        // Follow Hand
        points.position.x = THREE.MathUtils.lerp(points.position.x, (pts[9].x - 0.5) * -40, 0.1);
        points.position.y = THREE.MathUtils.lerp(points.position.y, (pts[9].y - 0.5) * -30, 0.1);

        // Rotate-to-Zoom
        const dx = pts[9].x - pts[0].x;
        const dy = pts[9].y - pts[0].y;
        const angle = Math.abs(Math.atan2(dy, dx) + Math.PI/2);
        const zScale = 1.0 + angle * 2.5;
        points.scale.lerp(new THREE.Vector3().setScalar(zScale), 0.1);

        // Gesture Detect
        const iU = pts[8].y < pts[6].y - 0.05;
        const mU = pts[12].y < pts[10].y - 0.05;
        const rU = pts[16].y < pts[14].y - 0.05;

        if (iU && mU && rU) { currentTarget = shapes.xmas; currentTargetCol = shapes.xmasCol; }
        else if (iU && mU) { currentTarget = shapes.earth; currentTargetCol = shapes.earthCol; }
        else if (iU) { currentTarget = shapes.eiffel; currentTargetCol = null; baseColor.setHex(0xffffff); }
        else { currentTarget = shapes.saturn; currentTargetCol = null; baseColor.setHex(0xffd700); }
    }
});

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 640, height: 480
});
cameraUtils.start();

// --- 4. ANIMATION LOOP ---
function animate() {
    requestAnimationFrame(animate);
    const pos = geometry.attributes.position;
    const col = geometry.attributes.color;

    for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;
        // Morphing Posisi
        pos.array[idx] += (currentTarget[idx] - pos.array[idx]) * 0.1;
        pos.array[idx+1] += (currentTarget[idx+1] - pos.array[idx+1]) * 0.1;
        pos.array[idx+2] += (currentTarget[idx+2] - pos.array[idx+2]) * 0.1;

        // Morphing Warna
        if (currentTargetCol) {
            col.array[idx] += (currentTargetCol[idx] - col.array[idx]) * 0.1;
            col.array[idx+1] += (currentTargetCol[idx+1] - col.array[idx+1]) * 0.1;
            col.array[idx+2] += (currentTargetCol[idx+2] - col.array[idx+2]) * 0.1;
        } else {
            col.array[idx] += (baseColor.r - col.array[idx]) * 0.1;
            col.array[idx+1] += (baseColor.g - col.array[idx+1]) * 0.1;
            col.array[idx+2] += (baseColor.b - col.array[idx+2]) * 0.1;
        }
    }
    
    pos.needsUpdate = true;
    col.needsUpdate = true;
    points.rotation.y += 0.005;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
